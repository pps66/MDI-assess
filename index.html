<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>แบบประเมินพ่นยา (MDI)</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --teal:#1D9E75;--teal-dark:#0F6E56;--teal-deep:#085041;--teal-light:#E1F5EE;
  --red-light:#FCEBEB;--red-mid:#A32D2D;--red-dark:#791F1F;
  --amber-light:#FAEEDA;--amber-dark:#633806;
  --blue-light:#E6F1FB;--blue-dark:#0C447C;
  --gray-bg:#F7F7F5;--card-bg:#fff;
  --border:rgba(0,0,0,.1);--border-mid:rgba(0,0,0,.18);
  --text:#1a1a1a;--text-muted:#6b6b68;
  --radius:10px;--radius-sm:6px;--radius-pill:99px;
}
body{font-family:'Sarabun',sans-serif;font-size:15px;color:var(--text);background:var(--gray-bg);min-height:100vh}
.wrap{max-width:680px;margin:0 auto;padding:1.25rem 1rem 3rem}
header{display:flex;align-items:center;gap:12px;margin-bottom:1.25rem}
.logo{width:38px;height:38px;background:var(--teal);border-radius:var(--radius-sm);display:flex;align-items:center;justify-content:center}
.logo svg{width:22px;height:22px;fill:none;stroke:#fff;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
header h1{font-size:17px;font-weight:600}
header p{font-size:12px;color:var(--text-muted);margin-top:1px}
.conn-badge{font-size:11px;padding:3px 8px;border-radius:var(--radius-pill);font-weight:500;margin-left:auto}
.conn-badge.online{background:var(--teal-light);color:var(--teal-deep)}
.conn-badge.offline{background:var(--amber-light);color:var(--amber-dark)}
.tab-bar{display:flex;border-bottom:1px solid var(--border);margin-bottom:1.25rem;overflow-x:auto}
.tab{padding:9px 16px;font-family:'Sarabun',sans-serif;font-size:14px;font-weight:500;background:none;border:none;border-bottom:2px solid transparent;cursor:pointer;color:var(--text-muted);transition:all .15s;white-space:nowrap}
.tab.active{color:var(--teal-dark);border-bottom-color:var(--teal)}
.card{background:var(--card-bg);border:1px solid var(--border);border-radius:var(--radius);padding:1rem 1.25rem;margin-bottom:.875rem}
.section-label{font-size:11px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:.07em;margin-bottom:10px}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.field{display:flex;flex-direction:column;gap:4px;margin-bottom:10px}
.field:last-child{margin-bottom:0}
.field label{font-size:13px;color:var(--text-muted)}
.field input,.field select{font-family:'Sarabun',sans-serif;font-size:14px;padding:7px 10px;border:1px solid var(--border-mid);border-radius:var(--radius-sm);background:#fff;color:var(--text);width:100%;transition:border-color .12s,box-shadow .12s}
.field input:focus,.field select:focus{outline:none;border-color:var(--teal);box-shadow:0 0 0 3px rgba(29,158,117,.12)}
.search-wrap{position:relative}
.search-clear{position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:18px;color:var(--text-muted);line-height:1;padding:0}
.dropdown{position:absolute;top:calc(100% + 4px);left:0;right:0;background:#fff;border:1px solid var(--border-mid);border-radius:var(--radius-sm);z-index:50;max-height:200px;overflow-y:auto;box-shadow:0 4px 12px rgba(0,0,0,.1)}
.dd-item{padding:9px 12px;cursor:pointer;font-size:14px;border-bottom:1px solid var(--border);transition:background .1s}
.dd-item:last-child{border-bottom:none}
.dd-item:hover{background:var(--gray-bg)}
.dd-item .sub{font-size:12px;color:var(--text-muted);margin-top:2px}
.patient-chip{background:var(--teal-light);border:1px solid rgba(29,158,117,.3);border-radius:var(--radius-sm);padding:10px 12px;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between;gap:10px}
.patient-chip .info{font-size:14px;font-weight:600;color:var(--teal-deep)}
.patient-chip .sub{font-size:12px;color:var(--teal-dark);margin-top:2px}
.patient-chip .clear-btn{background:none;border:none;cursor:pointer;font-size:20px;color:var(--teal-dark);line-height:1;flex-shrink:0}
.or-divider{display:flex;align-items:center;gap:8px;margin:10px 0}
.or-divider hr{flex:1;border:none;border-top:1px solid var(--border)}
.or-divider span{font-size:12px;color:var(--text-muted)}
.toggle-link{font-family:'Sarabun',sans-serif;font-size:13px;color:var(--teal-dark);background:none;border:none;cursor:pointer;text-decoration:underline;padding:0}
.checklist-item{display:flex;align-items:flex-start;gap:10px;padding:10px 0;border-bottom:1px solid var(--border)}
.checklist-item:last-of-type{border-bottom:none}
.item-num{font-size:11px;font-weight:600;color:var(--teal);min-width:18px;padding-top:3px}
.item-text{flex:1;font-size:14px;line-height:1.55}
.radio-group{display:flex;gap:5px;flex-shrink:0;padding-top:1px}
.radio-btn{font-family:'Sarabun',sans-serif;font-size:13px;padding:4px 13px;border:1px solid var(--border-mid);border-radius:var(--radius-pill);cursor:pointer;background:none;color:var(--text-muted);transition:all .12s;white-space:nowrap}
.radio-btn:hover{border-color:#888}
.radio-btn.do.selected{background:var(--teal-light);border-color:var(--teal);color:var(--teal-deep);font-weight:500}
.radio-btn.dont.selected{background:var(--red-light);border-color:#E24B4A;color:var(--red-mid);font-weight:500}
.score-bar-wrap{margin:14px 0 4px}
.score-bar-bg{height:6px;background:#eee;border-radius:var(--radius-pill);overflow:hidden}
.score-bar-fill{height:100%;border-radius:var(--radius-pill);background:var(--teal);transition:width .3s ease}
.score-label{font-size:13px;color:var(--text-muted);margin-top:5px}
.submit-btn{width:100%;padding:11px;font-family:'Sarabun',sans-serif;font-size:15px;font-weight:500;background:var(--teal);color:#fff;border:none;border-radius:var(--radius-sm);cursor:pointer;transition:background .12s}
.submit-btn:hover:not(:disabled){background:var(--teal-dark)}
.submit-btn:disabled{background:#ccc;color:#999;cursor:not-allowed}
.nav-btn{font-family:'Sarabun',sans-serif;font-size:13px;padding:5px 12px;border:1px solid var(--border-mid);border-radius:var(--radius-sm);background:#fff;cursor:pointer;color:var(--text-muted);transition:background .12s}
.nav-btn:hover:not(:disabled){background:var(--gray-bg)}
.nav-btn:disabled{opacity:.35;cursor:not-allowed}
.date-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem}
.date-label{font-size:14px;font-weight:500}
.metric-row{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:1rem}
.metric{background:var(--gray-bg);border-radius:var(--radius-sm);padding:10px 8px;text-align:center}
.metric .val{font-size:20px;font-weight:600;color:var(--text)}
.metric .lbl{font-size:11px;color:var(--text-muted);margin-top:3px;line-height:1.3}
.record-row{display:flex;align-items:center;gap:8px;padding:9px 0;border-bottom:1px solid var(--border)}
.record-row:last-child{border-bottom:none}
.record-info{flex:1;min-width:0}
.record-name{font-size:14px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.record-sub{font-size:12px;color:var(--text-muted);margin-top:1px}
.badge{font-size:12px;font-weight:600;padding:3px 8px;border-radius:var(--radius-pill);text-align:center;white-space:nowrap}
.badge.hi{background:var(--teal-light);color:var(--teal-deep)}
.badge.mid{background:var(--amber-light);color:var(--amber-dark)}
.badge.lo{background:var(--red-light);color:var(--red-dark)}
.badge.info{background:var(--blue-light);color:var(--blue-dark)}
.icon-btn{background:none;border:none;cursor:pointer;font-size:13px;padding:4px 6px;border-radius:4px;color:var(--text-muted);transition:background .12s}
.icon-btn:hover{background:var(--gray-bg)}
.icon-btn.red:hover{color:var(--red-mid)}
.detail-panel{background:var(--gray-bg);border-radius:var(--radius-sm);overflow:hidden;margin-bottom:6px}
.detail-row{display:flex;justify-content:space-between;align-items:center;gap:10px;font-size:13px;padding:7px 12px;border-bottom:1px solid var(--border)}
.detail-row:last-child{border-bottom:none}
.ok{color:var(--teal-dark);font-weight:500}
.ng{color:var(--red-mid);font-weight:500}
.worst-bar-bg{height:5px;background:#e5e5e5;border-radius:var(--radius-pill);overflow:hidden;flex:1}
.worst-bar-fill{height:100%;background:var(--teal);border-radius:var(--radius-pill)}
.empty{text-align:center;padding:2.5rem;color:var(--text-muted);font-size:14px}
.loading{text-align:center;padding:2rem;color:var(--text-muted);font-size:14px}
.timeline{border-left:2px solid var(--teal-light);padding-left:1rem;margin-top:8px}
.tl-item{position:relative;padding-bottom:14px}
.tl-item:last-child{padding-bottom:0}
.tl-item::before{content:'';position:absolute;left:-1.4rem;top:5px;width:10px;height:10px;border-radius:50%;background:var(--teal);border:2px solid #fff}
.tl-date{font-size:12px;color:var(--text-muted);margin-bottom:3px}
.tl-score{font-size:14px;font-weight:500}
.tl-items{display:flex;flex-wrap:wrap;gap:3px;margin-top:5px}
.tl-dot{font-size:11px;padding:2px 6px;border-radius:var(--radius-pill)}
.alert{border-radius:var(--radius-sm);padding:8px 12px;margin-bottom:10px;font-size:13px}
.alert.due{background:var(--teal-light);color:var(--teal-deep);border:1px solid rgba(29,158,117,.3)}
.alert.overdue{background:var(--red-light);color:var(--red-mid);border:1px solid rgba(226,75,74,.3)}
/* setup screen */
.setup-card{background:#fff;border:1px solid var(--border);border-radius:var(--radius);padding:1.5rem;margin-bottom:1rem}
.setup-card h2{font-size:16px;font-weight:600;margin-bottom:.5rem}
.setup-card p{font-size:13px;color:var(--text-muted);line-height:1.6;margin-bottom:10px}
.setup-card ol{padding-left:1.2rem;font-size:13px;color:var(--text-muted);line-height:1.8}
.setup-card code{background:var(--gray-bg);padding:2px 6px;border-radius:4px;font-size:12px;color:var(--text)}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(8px);background:var(--teal-deep);color:var(--teal-light);padding:9px 22px;border-radius:var(--radius-pill);font-size:14px;font-weight:500;opacity:0;pointer-events:none;transition:opacity .25s,transform .25s;z-index:999;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
#modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:1000;align-items:center;justify-content:center}
.modal-box{background:#fff;border-radius:12px;padding:1.5rem 1.25rem;max-width:320px;width:90%;margin:0 1rem}
.modal-box p{font-size:15px;color:var(--text);margin-bottom:1.25rem;line-height:1.6;text-align:center}
.modal-actions{display:flex;gap:10px}
.modal-actions button{flex:1;font-family:'Sarabun',sans-serif;font-size:14px;padding:9px;border-radius:6px;cursor:pointer;font-weight:500}
.modal-cancel{border:1px solid var(--border-mid);background:#fff;color:var(--text-muted)}
.modal-confirm{border:none;background:var(--red-mid);color:#fff}
@media(max-width:480px){
  .field-row{grid-template-columns:1fr}
  .metric-row{grid-template-columns:repeat(2,1fr)}
  .metric .val{font-size:18px}
  .radio-btn{padding:4px 9px;font-size:12px}
}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="logo">
      <svg viewBox="0 0 24 24"><path d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/></svg>
    </div>
    <div>
      <h1>แบบประเมินพ่นยา (MDI)</h1>
      <p>Metered-dose Inhaler Assessment</p>
    </div>
    <span id="conn-badge" class="conn-badge offline">⏳ กำลังเชื่อมต่อ</span>
  </header>

  <div class="tab-bar">
    <button class="tab active" id="tab-assess" onclick="showTab('assess')">บันทึกการประเมิน</button>
    <button class="tab" id="tab-patients" onclick="showTab('patients')">ประวัติผู้ป่วย</button>
    <button class="tab" id="tab-daily" onclick="showTab('daily')">สรุปรายวัน</button>
    <button class="tab" id="tab-fiscal" onclick="showTab('fiscal')">สรุปปีงบ</button>
  </div>

  <div id="view-assess"></div>
  <div id="view-patients" style="display:none"></div>
  <div id="view-daily" style="display:none"></div>
  <div id="view-fiscal" style="display:none"></div>

  <div class="toast" id="toast"></div>
  <div id="modal-overlay">
    <div class="modal-box">
      <p id="modal-msg"></p>
      <div class="modal-actions">
        <button class="modal-cancel" onclick="modalCancel()">ยกเลิก</button>
        <button class="modal-confirm" onclick="modalConfirm()">ยืนยันลบ</button>
      </div>
    </div>
  </div>
</div>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
// ╔══════════════════════════════════════════════════════════╗
// ║  ⚙️  วาง Firebase Config ที่นี่                         ║
// ║  ดูวิธีตั้งค่าในแท็บ "ประวัติผู้ป่วย"                  ║
// ╚══════════════════════════════════════════════════════════╝
const FIREBASE_CONFIG = {
  apiKey: "AIzaSyBowDY6_K5INpVOjvhImDitftX0GnXHvgo",
  authDomain: "mdi-assess.firebaseapp.com",
  databaseURL: "https://mdi-assess-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "mdi-assess",
  storageBucket: "mdi-assess.firebasestorage.app",
  messagingSenderId: "1050906512605",
  appId: "1:1050906512605:web:5e4ba33260d37cebc11f34",
  measurementId: "G-KGP750QP7N"
};
// ════════════════════════════════════════════════════════════

const ITEMS=[
  "เปิดฝาครอบออก เขย่าขวดยาให้ยากระจายตัวดี",
  "หายใจออกจนสุด (ถ้ามีเสมหะให้เอาเสมหะออกก่อน)",
  "ตั้งหลอดยาขึ้น ใช้ริมฝีปากอมปากกระบอกให้สนิท เอนศีรษะไปด้านหลังเล็กน้อย",
  "หายใจเข้าทางปากช้าๆ ลึกๆ พร้อมกดพ่นยา 1 ครั้ง",
  "ไม่มีควันออกจากปากและจมูกขณะพ่นยา เอากระบอกพ่นยาออกและหุบปากให้สนิท",
  "กลั้นหายใจไว้อย่างน้อย 10 วินาที หรือนานที่สุดเท่าที่จะทำได้",
  "หายใจออกทางจมูกช้าๆ",
  "หากต้องการพ่นยาซ้ำ ควรเว้นระยะห่างจากครั้งแรกประมาณ 1 นาที",
  "กรณีพ่นยาสูดสเตียรอยด์ให้บ้วนปากด้วยน้ำสะอาด หรือแปรงฟันหลังพ่นยาทุกครั้ง",
  "ทำความสะอาดด้วยน้ำ เช็ดให้แห้ง และเก็บ/ทำลายยาถูกวิธี (คืนห้องยา / ห้ามเผา / ห้ามทุบทำลาย)"
];
const MO=['','ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];

// ── Firebase / storage layer ─────────────────────────────
let _db=null, _useFirebase=false;

function initFirebase(){
  if(!FIREBASE_CONFIG.databaseURL){
    setBadge(false); return;
  }
  try{
    if(!firebase.apps.length) firebase.initializeApp(FIREBASE_CONFIG);
    _db=firebase.database();
    _useFirebase=true;
    setBadge(true);
  }catch(e){
    console.error('Firebase error:',e);
    setBadge(false);
  }
}

function setBadge(online){
  const b=document.getElementById('conn-badge');
  if(online){b.textContent='☁️ Cloud';b.className='conn-badge online';}
  else{b.textContent='💾 Local';b.className='conn-badge offline';}
}

// localStorage fallback
function lsLoad(k,d){try{return JSON.parse(localStorage.getItem(k)||'null')||d}catch{return d}}
function lsSave(k,v){try{localStorage.setItem(k,JSON.stringify(v))}catch{}}

async function getPatients(){
  if(_useFirebase){
    try{
      const s=await _db.ref('patients').get();
      if(!s.exists())return[];
      return Object.values(s.val()).sort((a,b)=>a.createdAt.localeCompare(b.createdAt));
    }catch(e){console.error(e)}
  }
  return lsLoad('mdi_patients',[]);
}
async function savePatients(arr){
  lsSave('mdi_patients',arr);
  if(_useFirebase){
    try{
      const obj=arr.length?Object.fromEntries(arr.map(p=>[p.id,p])):null;
      await _db.ref('patients').set(obj);
    }catch(e){console.error(e);showToast('⚠️ บันทึก Cloud ไม่สำเร็จ ลองใหม่');}
  }
}
async function getVisits(){
  if(_useFirebase){
    try{
      const s=await _db.ref('visits').get();
      if(!s.exists())return[];
      return Object.values(s.val()).sort((a,b)=>a.date.localeCompare(b.date)||a.time.localeCompare(b.time));
    }catch(e){console.error(e)}
  }
  return lsLoad('mdi_visits',[]);
}
async function saveVisits(arr){
  lsSave('mdi_visits',arr);
  if(_useFirebase){
    try{
      const obj=arr.length?Object.fromEntries(arr.map(v=>[v.id,v])):null;
      await _db.ref('visits').set(obj);
    }catch(e){console.error(e);showToast('⚠️ บันทึก Cloud ไม่สำเร็จ ลองใหม่');}
  }
}

// ── date helpers ─────────────────────────────────────────
function todayISO(){const d=new Date();return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate())}
function pad(n){return String(n).padStart(2,'0')}
function fmtDate(s){if(!s)return'-';const[y,m,d]=s.split('-').map(Number);return`${d} ${MO[m]} ${y+543}`}

// ── ui state ──────────────────────────────────────────────
let scores=new Array(10).fill(null);
let selPatient=null, showNewForm=false, searchQ='';
let viewDate=todayISO(), expVisit=null, expPatient=null, dbQ='';
let _mcb=null;

function showModal(msg,cb){_mcb=cb;document.getElementById('modal-msg').textContent=msg;document.getElementById('modal-overlay').style.display='flex'}
function modalConfirm(){document.getElementById('modal-overlay').style.display='none';if(_mcb)_mcb();_mcb=null}
function modalCancel(){document.getElementById('modal-overlay').style.display='none';_mcb=null}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2600)}
function setLoading(id){document.getElementById(id).innerHTML='<div class="loading">⏳ กำลังโหลด...</div>'}

function answered(){return scores.filter(s=>s!==null).length}
function totalScore(){return scores.filter(s=>s===true).length}
function scClass(s){return s>=8?'hi':s>=5?'mid':'lo'}
function setScore(i,v){scores[i]=v;renderAssess()}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

// ── patient helpers ───────────────────────────────────────
function pvs(visits,pid){return visits.filter(v=>v.patientId===pid).sort((a,b)=>a.date.localeCompare(b.date))}
function lastV(visits,pid){const v=pvs(visits,pid);return v.length?v[v.length-1]:null}

// ══════════════════════════════════════════════════════════
// TAB 1 — บันทึกการประเมิน
// ══════════════════════════════════════════════════════════
async function renderAssess(){
  const patients=await getPatients();
  const ans=answered(),sc2=totalScore(),pct=Math.round(sc2/10*100),full=ans===10;
  const filtered=searchQ.length>=1
    ?patients.filter(p=>p.hn.toLowerCase().includes(searchQ.toLowerCase())||p.name.toLowerCase().includes(searchQ.toLowerCase()))
    :[];
  let h='';

  // ── patient select / chip ──────────────────────────────
  if(!selPatient){
    const visits=await getVisits();
    h+=`<div class="card" style="margin-bottom:.75rem">
      <div class="section-label">ค้นหาผู้ป่วยเดิม</div>
      <div class="search-wrap">
        <input id="sq" type="text" placeholder="พิมพ์ HN หรือชื่อผู้ป่วย..."
          value="${esc(searchQ)}" oninput="searchQ=this.value;renderAssess()" autocomplete="off"
          style="width:100%;padding-right:32px">
        ${searchQ?`<button class="search-clear" onclick="searchQ='';renderAssess()">×</button>`:''}
        ${filtered.length?`<div class="dropdown">
          ${filtered.map(p=>{
            const lv=lastV(visits,p.id);
            const vc=pvs(visits,p.id).length;
            return`<div class="dd-item" onclick="pickPatient('${p.id}')">
              <strong>${esc(p.name)}</strong> — HN: ${esc(p.hn)}
              <div class="sub">อายุ ${p.age} ปี · ประเมิน ${vc} ครั้ง${lv?` · ล่าสุด ${fmtDate(lv.date)}`:''}</div>
            </div>`;
          }).join('')}
        </div>`:''}
      </div>
      <div class="or-divider"><hr><span>หรือ</span><hr></div>
      <button class="toggle-link" onclick="showNewForm=!showNewForm;renderAssess()">
        ${showNewForm?'▲ ซ่อน':'＋ เพิ่มผู้ป่วยใหม่'}
      </button>
      ${showNewForm?`<div style="margin-top:12px">
        <div class="field-row">
          <div class="field"><label>HN *</label><input id="nhn" type="text" placeholder="เลขทะเบียน"></div>
          <div class="field"><label>อายุ (ปี) *</label><input id="nage" type="number" placeholder="อายุ" min="1"></div>
        </div>
        <div class="field"><label>ชื่อ-นามสกุล *</label><input id="nname" type="text" placeholder="ชื่อผู้ป่วย"></div>
        <button class="submit-btn" onclick="addPatient()">บันทึกและเลือกผู้ป่วยนี้</button>
      </div>`:''}
    </div>`;
  } else {
    const visits=await getVisits();
    const vpList=pvs(visits,selPatient.id);
    const lv=vpList.length?vpList[vpList.length-1]:null;
    h+=`<div class="patient-chip" style="margin-bottom:.75rem">
      <div>
        <div class="info">${esc(selPatient.name)} — HN: ${esc(selPatient.hn)}</div>
        <div class="sub">อายุ ${selPatient.age} ปี · ประเมินมาแล้ว ${vpList.length} ครั้ง${lv?` · ครั้งล่าสุด ${fmtDate(lv.date)}`:''}</div>
      </div>
      <button class="clear-btn" onclick="clearPatient()">×</button>
    </div>`;
  }

  // ── checklist (แสดงเสมอ) ────────────────────────────
  h+=`<div class="card">
    <div class="section-label">รายการประเมินการพ่นยา (${ans}/10)</div>`;
  ITEMS.forEach((item,i)=>{
    h+=`<div class="checklist-item">
      <span class="item-num">${i+1}</span>
      <span class="item-text">${item}</span>
      <div class="radio-group">
        <button class="radio-btn do${scores[i]===true?' selected':''}" onclick="setScore(${i},true)">ทำ</button>
        <button class="radio-btn dont${scores[i]===false?' selected':''}" onclick="setScore(${i},false)">ไม่ทำ</button>
      </div>
    </div>`;
  });
  h+=`<div class="score-bar-wrap">
    <div class="score-bar-bg"><div class="score-bar-fill" style="width:${pct}%"></div></div>
    <div class="score-label">ทำถูกต้อง <strong>${sc2}/10</strong> ข้อ (${pct}%)${full?'':` · ยังไม่ตอบอีก ${10-ans} ข้อ`}</div>
  </div></div>`;

  if(selPatient){
    h+=`<button class="submit-btn" onclick="submitAssess()" ${!full?'disabled':''}>
      ${full?'บันทึกการประเมิน':`กรุณาตอบให้ครบทุกข้อ (เหลือ ${10-ans} ข้อ)`}
    </button>`;
  } else {
    h+=`<div style="text-align:center;padding:10px;font-size:13px;color:var(--text-muted)">

    </div>`;
  }

  if(!selPatient&&searchQ){const inp=document.getElementById('sq');if(inp){inp.focus();inp.setSelectionRange(inp.value.length,inp.value.length)}}
}

async function pickPatient(id){
  const patients=await getPatients();
  const p=patients.find(x=>x.id===id);if(!p)return;
  selPatient=p;searchQ='';showNewForm=false;scores=new Array(10).fill(null);
  renderAssess();
}
function clearPatient(){selPatient=null;scores=new Array(10).fill(null);renderAssess()}

async function addPatient(){
  const hn=(document.getElementById('nhn').value||'').trim();
  const name=(document.getElementById('nname').value||'').trim();
  const age=(document.getElementById('nage').value||'').trim();
  if(!hn||!name||!age){showToast('กรุณากรอก HN, ชื่อ และอายุ');return}
  const patients=await getPatients();
  if(patients.find(p=>p.hn===hn)){showToast('HN นี้มีในระบบแล้ว — ค้นหาได้เลย');return}
  const p={id:'p'+Date.now(),hn,name,age:parseInt(age),createdAt:todayISO()};
  await savePatients([...patients,p]);
  selPatient=p;searchQ='';showNewForm=false;scores=new Array(10).fill(null);
  renderAssess();showToast(`เพิ่มผู้ป่วยใหม่: ${name}`);
}

async function submitAssess(){
  if(!selPatient||answered()<10)return;
  const now=new Date();
  const visit={
    id:'v'+Date.now(),patientId:selPatient.id,
    date:todayISO(),time:now.toLocaleTimeString('th-TH',{hour:'2-digit',minute:'2-digit'}),
    scores:[...scores],total:totalScore(),pct:Math.round(totalScore()*10)
  };
  const visits=await getVisits();
  await saveVisits([...visits,visit]);
  const name=selPatient.name;
  clearPatient();
  showToast(`✓ บันทึกแล้ว — ${name} ได้ ${visit.total}/10 (${visit.pct}%)`);
}

// ══════════════════════════════════════════════════════════
async function renderPatients(){
  setLoading('view-patients');
  const patients=await getPatients();
  const visits=await getVisits();
  const q=dbQ.toLowerCase();
  const list=q?patients.filter(p=>p.hn.toLowerCase().includes(q)||p.name.toLowerCase().includes(q)):patients;

  let h='';

  const dueToday=patients.filter(p=>{const lv=lastV(visits,p.id);return lv&&lv.nextDate===todayISO()});
  const overdue=patients.filter(p=>{const lv=lastV(visits,p.id);return lv&&lv.nextDate<todayISO()});

  h+=`<div style="display:flex;align-items:center;gap:8px;margin-bottom:1rem">
    <div class="search-wrap" style="flex:1">
      <input type="text" placeholder="ค้นหา HN หรือชื่อ..." value="${esc(dbQ)}"
        oninput="dbQ=this.value;renderPatients()" style="width:100%;padding-right:32px">
      ${dbQ?`<button class="search-clear" onclick="dbQ='';renderPatients()">×</button>`:''}
    </div>
    <span style="font-size:13px;color:var(--text-muted);white-space:nowrap">${patients.length} ราย</span>
  </div>`;

  if(dueToday.length) h+=`<div class="alert due">📅 นัดประเมินวันนี้ ${dueToday.length} ราย: ${dueToday.map(p=>p.name).join(', ')}</div>`;
  if(overdue.length) h+=`<div class="alert overdue">⚠️ เลยกำหนดนัด ${overdue.length} ราย: ${overdue.map(p=>p.name).join(', ')}</div>`;

  if(!list.length){
    h+=`<div class="empty">${patients.length?'ไม่พบผู้ป่วยที่ค้นหา':'ยังไม่มีข้อมูลผู้ป่วย'}</div>`;
  } else {
    h+=`<div class="card">`;
    list.forEach(p=>{
      const pvsArr=pvs(visits,p.id);
      const lv=pvsArr.length?pvsArr[pvsArr.length-1]:null;
      const exp=expPatient===p.id;
      h+=`<div class="record-row">
        <div class="record-info">
          <div class="record-name">${esc(p.name)}</div>
          <div class="record-sub">HN: ${esc(p.hn)} · อายุ ${p.age} ปี · ประเมิน ${pvsArr.length} ครั้ง</div>
        </div>
        ${lv?`<span class="badge ${scClass(lv.total)}">${lv.pct}%</span>`:''}
        <button class="icon-btn" onclick="expPatient=expPatient==='${p.id}'?null:'${p.id}';renderPatients()">${exp?'▲':'▼'}</button>
        <button class="icon-btn red" onclick="delPatient('${p.id}')">🗑</button>
      </div>`;
      if(exp){
        h+=`<div class="detail-panel" style="margin-bottom:8px"><div style="padding:10px 12px">`;
        if(!pvsArr.length){
          h+=`<p style="font-size:13px;color:var(--text-muted)">ยังไม่มีประวัติการประเมิน</p>`;
        } else {
          h+=`<div class="timeline">`;
          pvsArr.slice().reverse().forEach(v=>{
            h+=`<div class="tl-item">
              <div class="tl-date">${fmtDate(v.date)} เวลา ${v.time}</div>
              <div class="tl-score">คะแนน ${v.total}/10 <span class="badge ${scClass(v.total)}">${v.pct}%</span></div>
              <div class="tl-items">
                ${ITEMS.map((_,i)=>`<span class="tl-dot" style="background:${v.scores[i]?'var(--teal-light)':'var(--red-light)'};color:${v.scores[i]?'var(--teal-deep)':'var(--red-dark)'}">${i+1}${v.scores[i]?'✓':'✗'}</span>`).join('')}
              </div>
            </div>`;
          });
          h+=`</div>`;
        }
        h+=`</div><div style="padding:8px 12px;border-top:1px solid var(--border);display:flex;gap:8px;flex-wrap:wrap">
          <button class="nav-btn" onclick="goAssess('${p.id}')">+ ประเมินครั้งใหม่</button>
          <button class="nav-btn" onclick="exportPatCSV('${p.id}')">⬇ Export CSV</button>
        </div></div>`;
      }
    });
    h+=`</div>`;
  }

  h+=`<div style="display:flex;justify-content:space-between;align-items:center;margin-top:.75rem;flex-wrap:wrap;gap:8px">
    <button class="nav-btn" style="color:var(--red-mid);border-color:rgba(226,75,74,.3)" onclick="delAllData()">🗑 ลบข้อมูลทั้งหมด</button>
    <div style="display:flex;gap:8px;flex-wrap:wrap">
      <button class="nav-btn" onclick="exportAllCSV()">⬇ Export CSV</button>
      <button class="nav-btn" onclick="backupJSON()">💾 สำรองข้อมูล</button>
      <button class="nav-btn" onclick="document.getElementById('imp').click()">📂 นำเข้าข้อมูล</button>
    </div>
  </div>
  <input type="file" id="imp" accept=".json" style="display:none" onchange="importJSON(this)">`;

  document.getElementById('view-patients').innerHTML=h;
}

async function goAssess(id){
  showTab('assess');
  await pickPatient(id);
}

async function delPatient(id){
  const patients=await getPatients();
  const p=patients.find(x=>x.id===id);if(!p)return;
  const visits=await getVisits();
  const n=visits.filter(v=>v.patientId===id).length;
  showModal(`ต้องการลบ "${p.name}" และประวัติทั้งหมด ${n} ครั้งใช่หรือไม่?`,async()=>{
    await savePatients(patients.filter(x=>x.id!==id));
    await saveVisits(visits.filter(v=>v.patientId!==id));
    expPatient=null;await renderPatients();showToast(`ลบ ${p.name} แล้ว`);
  });
}

async function delAllData(){
  const n=(await getPatients()).length;
  showModal(`ต้องการลบข้อมูลผู้ป่วยทั้งหมด ${n} ราย และประวัติทั้งหมดใช่หรือไม่?`,async()=>{
    await savePatients([]);await saveVisits([]);expPatient=null;await renderPatients();showToast('ลบข้อมูลทั้งหมดแล้ว');
  });
}

async function backupJSON(){
  const data={patients:await getPatients(),visits:await getVisits(),exportedAt:new Date().toISOString()};
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([JSON.stringify(data,null,2)],{type:'application/json'}));
  a.download=`mdi_backup_${todayISO()}.json`;a.click();
  showToast('สำรองข้อมูลเรียบร้อย');
}

async function importJSON(input){
  const file=input.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=async function(e){
    try{
      const data=JSON.parse(e.target.result);
      if(!data.patients||!data.visits){showToast('ไฟล์ไม่ถูกต้อง');return}
      showModal(`นำเข้า ${data.patients.length} ราย และ ${data.visits.length} ครั้ง\n(จะรวมกับข้อมูลที่มีอยู่ ไม่ลบทับ)`,async()=>{
        const ep=await getPatients();
        const eids=new Set(ep.map(p=>p.id));
        const np=data.patients.filter(p=>!eids.has(p.id));
        await savePatients([...ep,...np]);
        const ev=await getVisits();
        const evids=new Set(ev.map(v=>v.id));
        const nv=data.visits.filter(v=>!evids.has(v.id));
        await saveVisits([...ev,...nv]);
        expPatient=null;await renderPatients();
        showToast(`นำเข้าแล้ว: ผู้ป่วยใหม่ ${np.length} ราย · ประเมินใหม่ ${nv.length} ครั้ง`);
      });
    }catch{showToast('อ่านไฟล์ไม่ได้ กรุณาตรวจสอบไฟล์');}
    input.value='';
  };
  reader.readAsText(file);
}

async function exportPatCSV(id){
  const patients=await getPatients();
  const p=patients.find(x=>x.id===id);if(!p)return;
  const visits=await getVisits();
  const pvsArr=pvs(visits,id);
  const hdr=['HN','ชื่อ','อายุ','วันที่','เวลา','คะแนน','ร้อยละ',...ITEMS.map((_,i)=>`ข้อ${i+1}`)];
  const rows=pvsArr.map(v=>[p.hn,p.name,p.age,v.date,v.time,v.total,v.pct+'%',...v.scores.map(s=>s?'1':'0')]);
  dlCSV(rows,hdr,`mdi_${p.hn}`);
}

async function exportAllCSV(){
  const patients=await getPatients(),visits=await getVisits();
  const hdr=['HN','ชื่อ','อายุ','วันที่','เวลา','คะแนน','ร้อยละ',...ITEMS.map((_,i)=>`ข้อ${i+1}`)];
  const rows=visits.map(v=>{
    const p=patients.find(x=>x.id===v.patientId)||{hn:'-',name:'-',age:'-'};
    return[p.hn,p.name,p.age,v.date,v.time,v.total,v.pct+'%',...v.scores.map(s=>s?'1':'0')];
  });
  dlCSV(rows,hdr,'mdi_all');
}

function dlCSV(rows,hdr,fn){
  if(!rows.length){showToast('ไม่มีข้อมูล');return}
  const csv='\uFEFF'+[hdr,...rows].map(r=>r.map(v=>`"${v}"`).join(',')).join('\n');
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv;charset=utf-8'}));
  a.download=fn+'.csv';a.click();
}

async function renderDaily(){
  setLoading('view-daily');
  const patients=await getPatients(),allV=await getVisits();
  const isToday=viewDate===todayISO();
  const dayV=allV.filter(v=>v.date===viewDate);
  const n=dayV.length;
  const avg=n?dayV.reduce((s,v)=>s+v.total,0)/n:0;
  const avgPct=n?Math.round(avg*10):null;
  const perfect=dayV.filter(v=>v.total===10).length;

  let h=`<div class="date-nav">
    <button class="nav-btn" onclick="changeDate(-1)">← วันก่อน</button>
    <span class="date-label">${fmtDate(viewDate)}${isToday?' (วันนี้)':''}</span>
    <button class="nav-btn" onclick="changeDate(1)" ${isToday?'disabled':''}>วันถัดไป →</button>
  </div>
  <div class="metric-row">
    <div class="metric"><div class="val">${n}</div><div class="lbl">ผู้ป่วยทั้งหมด</div></div>
    <div class="metric"><div class="val">${n?avg.toFixed(1):'-'}</div><div class="lbl">คะแนนเฉลี่ย</div></div>
    <div class="metric"><div class="val">${avgPct!==null?avgPct+'%':'-'}</div><div class="lbl">ร้อยละการพ่นยาถูกต้อง</div></div>
    <div class="metric"><div class="val">${perfect}</div><div class="lbl">ได้ 10/10</div></div>
  </div>`;

  if(!n){
    h+=`<div class="empty">ยังไม่มีการบันทึกในวันนี้</div>`;
  } else {
    h+=`<div class="card">`;
    dayV.slice().reverse().forEach(v=>{
      const p=patients.find(x=>x.id===v.patientId)||{name:'-',hn:'-',age:'-'};
      const exp=expVisit===v.id;
      h+=`<div class="record-row">
        <div class="record-info">
          <div class="record-name">${esc(p.name)}${p.age!=='-'?` (${p.age} ปี)`:''}</div>
          <div class="record-sub">HN: ${esc(p.hn)} · ${v.time}</div>
        </div>
        <span class="badge ${scClass(v.total)}">${v.total}/10</span>
        <span class="badge ${scClass(v.total)}">${v.pct}%</span>
        <button class="icon-btn" onclick="expVisit=expVisit==='${v.id}'?null:'${v.id}';renderDaily()">${exp?'▲':'▼'}</button>
        <button class="icon-btn red" onclick="delVisit('${v.id}')">🗑</button>
      </div>`;
      if(exp){
        h+=`<div class="detail-panel">`;
        ITEMS.forEach((item,i)=>{
          h+=`<div class="detail-row"><span style="flex:1">${i+1}. ${item}</span><span class="${v.scores[i]?'ok':'ng'}">${v.scores[i]?'✓ ทำ':'✗ ไม่ทำ'}</span></div>`;
        });
        h+=`</div>`;
      }
    });
    h+=`</div>`;

    const pr=ITEMS.map((_,i)=>({i,pct:Math.round(dayV.filter(v=>v.scores[i]).length/n*100)})).sort((a,b)=>a.pct-b.pct).slice(0,3);
    h+=`<div class="card" style="margin-top:.5rem"><div class="section-label">ข้อที่ทำผิดบ่อยที่สุด</div>`;
    pr.forEach(w=>{
      h+=`<div style="margin-bottom:12px">
        <div style="font-size:13px;margin-bottom:5px;line-height:1.4">${w.i+1}. ${ITEMS[w.i]}</div>
        <div style="display:flex;align-items:center;gap:8px">
          <div class="worst-bar-bg"><div class="worst-bar-fill" style="width:${w.pct}%"></div></div>
          <span style="font-size:12px;color:var(--text-muted);min-width:52px">ทำได้ ${w.pct}%</span>
        </div>
      </div>`;
    });
    h+=`</div>`;

    h+=`<div style="display:flex;justify-content:space-between;align-items:center;margin-top:.5rem">
      <button class="nav-btn" style="color:var(--red-mid);border-color:rgba(226,75,74,.3)" onclick="delDayAll()">🗑 ลบข้อมูลวันนี้</button>
      <button class="nav-btn" onclick="exportDayCSV()">⬇ Export CSV</button>
    </div>`;
  }
  document.getElementById('view-daily').innerHTML=h;
}

async function delVisit(id){
  showModal('ต้องการลบรายการนี้ใช่หรือไม่?',async()=>{
    const visits=await getVisits();
    await saveVisits(visits.filter(v=>v.id!==id));
    expVisit=null;await renderDaily();showToast('ลบรายการแล้ว');
  });
}
async function delDayAll(){
  const visits=await getVisits();
  const n=visits.filter(v=>v.date===viewDate).length;
  showModal(`ต้องการลบข้อมูลทั้งหมด ${n} รายการของวันที่ ${fmtDate(viewDate)} ใช่หรือไม่?`,async()=>{
    await saveVisits(visits.filter(v=>v.date!==viewDate));
    expVisit=null;await renderDaily();showToast(`ลบ ${n} รายการแล้ว`);
  });
}
function changeDate(d){
  const dt=new Date(viewDate);dt.setDate(dt.getDate()+d);
  const s=dt.getFullYear()+'-'+pad(dt.getMonth()+1)+'-'+pad(dt.getDate());
  if(s>todayISO())return;
  viewDate=s;expVisit=null;renderDaily();
}
async function exportDayCSV(){
  const patients=await getPatients(),visits=await getVisits();
  const dayV=visits.filter(v=>v.date===viewDate);
  const hdr=['HN','ชื่อ','อายุ','วันที่','เวลา','คะแนน','ร้อยละ',...ITEMS.map((_,i)=>`ข้อ${i+1}`)];
  const rows=dayV.map(v=>{
    const p=patients.find(x=>x.id===v.patientId)||{hn:'-',name:'-',age:'-'};
    return[p.hn,p.name,p.age,v.date,v.time,v.total,v.pct+'%',...v.scores.map(s=>s?'1':'0')];
  });
  dlCSV(rows,hdr,'mdi_daily_'+viewDate);
}

// TAB 4 — สรุปปีงบประมาณ
// ══════════════════════════════════════════════════════════

// ปีงบ (BE): เดือน ต.ค. ปีก่อน – ก.ย. ปีนี้
// เช่น ปีงบ 2569 = 1 ต.ค. 2568 – 30 ก.ย. 2569 (CE: 2025-10-01 – 2026-09-30)
function currentFiscalYear(){
  const d=new Date(), m=d.getMonth()+1, y=d.getFullYear();
  return m>=10 ? (y+543+1) : (y+543);
}
function fiscalDateRange(fyBE){
  const ce=fyBE-543;
  return {start:`${ce-1}-10-01`, end:`${ce}-09-30`};
}
function isoToFiscalYear(iso){
  const[y,m]=iso.split('-').map(Number);
  return m>=10 ? (y+543+1) : (y+543);
}
function fiscalMonthLabel(iso){
  const[,m]=iso.split('-').map(Number);
  return MO[m];
}
// เรียงลำดับเดือนในปีงบ: ต.ค.(10)...ก.ย.(9)
function fiscalMonthOrder(m){return m>=10?m-10:m+2}

let fiscalYear=currentFiscalYear();

async function renderFiscal(){
  setLoading('view-fiscal');
  const patients=await getPatients(), allV=await getVisits();
  const {start,end}=fiscalDateRange(fiscalYear);
  const fyV=allV.filter(v=>v.date>=start&&v.date<=end);
  const n=fyV.length;
  const uniquePat=new Set(fyV.map(v=>v.patientId)).size;
  const avg=n?fyV.reduce((s,v)=>s+v.total,0)/n:0;
  const avgPct=n?Math.round(avg*10):null;
  const perfect=fyV.filter(v=>v.total===10).length;

  // ── ปีงบที่มีข้อมูล ──
  const allFY=[...new Set(allV.map(v=>isoToFiscalYear(v.date)))].sort((a,b)=>b-a);
  if(!allFY.includes(fiscalYear)) allFY.unshift(fiscalYear);

  let h=`<div class="date-nav" style="margin-bottom:1rem">
    <button class="nav-btn" onclick="fiscalYear--;renderFiscal()">← ปีก่อน</button>
    <div style="text-align:center">
      <div class="date-label">ปีงบประมาณ ${fiscalYear}</div>
      <div style="font-size:11px;color:var(--text-muted);margin-top:2px">1 ต.ค. ${fiscalYear-1} – 30 ก.ย. ${fiscalYear}</div>
    </div>
    <button class="nav-btn" onclick="fiscalYear++;renderFiscal()" ${fiscalYear>=currentFiscalYear()?'disabled':''}>ปีถัดไป →</button>
  </div>`;

  // ── metric cards ──
  h+=`<div class="metric-row" style="grid-template-columns:repeat(2,1fr);margin-bottom:.75rem">
    <div class="metric"><div class="val">${uniquePat}</div><div class="lbl">ผู้ป่วยที่ได้รับการประเมิน</div></div>
    <div class="metric"><div class="val">${n}</div><div class="lbl">จำนวนครั้งที่ประเมิน</div></div>
    <div class="metric"><div class="val">${n?avg.toFixed(1):'-'}</div><div class="lbl">คะแนนเฉลี่ย</div></div>
    <div class="metric"><div class="val">${avgPct!==null?avgPct+'%':'-'}</div><div class="lbl">ร้อยละการพ่นยาถูกต้อง</div></div>
  </div>`;

  if(!n){
    h+=`<div class="empty">ไม่มีข้อมูลในปีงบ ${fiscalYear}</div>`;
    document.getElementById('view-fiscal').innerHTML=h; return;
  }

  // ── สรุปรายเดือน ──
  const monthMap={};
  fyV.forEach(v=>{
    const mo=v.date.slice(0,7); // YYYY-MM
    if(!monthMap[mo]) monthMap[mo]={count:0,total:0,pct:0};
    monthMap[mo].count++;
    monthMap[mo].total+=v.total;
    monthMap[mo].pct+=v.pct;
  });
  const months=Object.keys(monthMap).sort((a,b)=>{
    const ma=parseInt(a.split('-')[1]),mb=parseInt(b.split('-')[1]);
    return fiscalMonthOrder(ma)-fiscalMonthOrder(mb);
  });

  h+=`<div class="card"><div class="section-label">สรุปรายเดือน</div>
    <table style="width:100%;border-collapse:collapse;font-size:13px">
      <thead>
        <tr style="border-bottom:1px solid var(--border)">
          <th style="text-align:left;padding:6px 4px;color:var(--text-muted);font-weight:500">เดือน</th>
          <th style="text-align:center;padding:6px 4px;color:var(--text-muted);font-weight:500">ราย</th>
          <th style="text-align:center;padding:6px 4px;color:var(--text-muted);font-weight:500">คะแนนเฉลี่ย</th>
          <th style="text-align:center;padding:6px 4px;color:var(--text-muted);font-weight:500">ร้อยละ</th>
          <th style="text-align:left;padding:6px 4px;color:var(--text-muted);font-weight:500">กราฟ</th>
        </tr>
      </thead>
      <tbody>`;
  months.forEach(mo=>{
    const d=monthMap[mo];
    const avgMo=(d.total/d.count).toFixed(1);
    const pctMo=Math.round(d.pct/d.count);
    const[y,m]=mo.split('-').map(Number);
    const label=`${MO[m]} ${y+543}`;
    const barColor=pctMo>=80?'var(--teal)':pctMo>=50?'#F5A623':'var(--red-mid)';
    h+=`<tr style="border-bottom:1px solid var(--border)">
      <td style="padding:7px 4px">${label}</td>
      <td style="text-align:center;padding:7px 4px">${d.count}</td>
      <td style="text-align:center;padding:7px 4px">${avgMo}</td>
      <td style="text-align:center;padding:7px 4px"><span class="badge ${pctMo>=80?'hi':pctMo>=50?'mid':'lo'}">${pctMo}%</span></td>
      <td style="padding:7px 4px;min-width:80px">
        <div style="height:5px;background:#eee;border-radius:99px;overflow:hidden">
          <div style="height:100%;width:${pctMo}%;background:${barColor};border-radius:99px"></div>
        </div>
      </td>
    </tr>`;
  });
  h+=`</tbody></table></div>`;

  // ── ข้อที่ทำผิดบ่อยสุด ──
  const pr=ITEMS.map((_,i)=>({i,pct:Math.round(fyV.filter(v=>v.scores[i]).length/n*100)})).sort((a,b)=>a.pct-b.pct).slice(0,5);
  h+=`<div class="card"><div class="section-label">5 ข้อที่ทำผิดบ่อยที่สุดในปีงบ ${fiscalYear}</div>`;
  pr.forEach((w,rank)=>{
    h+=`<div style="margin-bottom:12px;display:flex;align-items:center;gap:10px">
      <span style="font-size:12px;font-weight:600;color:var(--text-muted);min-width:18px">${rank+1}</span>
      <div style="flex:1">
        <div style="font-size:13px;margin-bottom:4px;line-height:1.4">${w.i+1}. ${ITEMS[w.i]}</div>
        <div style="display:flex;align-items:center;gap:8px">
          <div class="worst-bar-bg"><div class="worst-bar-fill" style="width:${w.pct}%"></div></div>
          <span style="font-size:12px;color:var(--text-muted);min-width:52px">ทำได้ ${w.pct}%</span>
        </div>
      </div>
    </div>`;
  });
  h+=`</div>`;

  // ── รายชื่อผู้ป่วยในปีงบนี้ ──
  const patIds=[...new Set(fyV.map(v=>v.patientId))];
  h+=`<div class="card"><div class="section-label">รายชื่อผู้ป่วยในปีงบ ${fiscalYear} (${patIds.length} ราย)</div>`;
  patIds.forEach(pid=>{
    const p=patients.find(x=>x.id===pid)||{name:'-',hn:'-',age:'-'};
    const pVisits=fyV.filter(v=>v.patientId===pid).sort((a,b)=>a.date.localeCompare(b.date));
    const avgP=pVisits.reduce((s,v)=>s+v.total,0)/pVisits.length;
    const avgPctP=Math.round(avgP*10);
    h+=`<div class="record-row">
      <div class="record-info">
        <div class="record-name">${esc(p.name)}</div>
        <div class="record-sub">HN: ${esc(p.hn)} · ${pVisits.length} ครั้ง · ครั้งแรก ${fmtDate(pVisits[0].date)} · ล่าสุด ${fmtDate(pVisits[pVisits.length-1].date)}</div>
      </div>
      <span class="badge ${scClass(Math.round(avgP))}">${avgPctP}%</span>
    </div>`;
  });
  h+=`</div>`;

  // ── export ──
  h+=`<div style="text-align:right;margin-top:.5rem">
    <button class="nav-btn" onclick="exportFiscalCSV()">⬇ Export CSV ปีงบ ${fiscalYear}</button>
  </div>`;

  document.getElementById('view-fiscal').innerHTML=h;
}

async function exportFiscalCSV(){
  const patients=await getPatients(), allV=await getVisits();
  const {start,end}=fiscalDateRange(fiscalYear);
  const fyV=allV.filter(v=>v.date>=start&&v.date<=end);
  const hdr=['ปีงบ','HN','ชื่อ','อายุ','วันที่','เวลา','คะแนน','ร้อยละ',...ITEMS.map((_,i)=>`ข้อ${i+1}`)];
  const rows=fyV.map(v=>{
    const p=patients.find(x=>x.id===v.patientId)||{hn:'-',name:'-',age:'-'};
    return[fiscalYear,p.hn,p.name,p.age,v.date,v.time,v.total,v.pct+'%',...v.scores.map(s=>s?'1':'0')];
  });
  dlCSV(rows,hdr,`mdi_fiscal_${fiscalYear}`);
}

// ── tab switch ───────────────────────────────────────────
function showTab(tab){
  ['assess','patients','daily','fiscal'].forEach(t=>{
    document.getElementById('tab-'+t).className='tab'+(t===tab?' active':'');
    document.getElementById('view-'+t).style.display=t===tab?'':'none';
  });
  if(tab==='assess')renderAssess();
  else if(tab==='patients')renderPatients();
  else if(tab==='daily')renderDaily();
  else if(tab==='fiscal')renderFiscal();
}

// ── init ─────────────────────────────────────────────────
initFirebase();
renderAssess();
</script>
</body>
